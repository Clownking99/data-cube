name: Build and Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  JAVA_VERSION: '21'
  JAVAFX_VERSION: '21.0.7'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            V=${LATEST#v}
            MAJOR=$(echo $V | cut -d. -f1)
            MINOR=$(echo $V | cut -d. -f2)
            PATCH=$(echo $V | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))"
          fi
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Build version: $NEXT"

      - name: Download OpenJFX
        run: |
          curl -sL "https://download2.gluonhq.com/openjfx/${JAVAFX_VERSION}/openjfx-${JAVAFX_VERSION}_linux-x64_bin-sdk.zip" -o javafx-sdk.zip
          unzip -q javafx-sdk.zip
          mkdir -p lib
          cp javafx-sdk-${JAVAFX_VERSION}/lib/javafx.base.jar lib/
          cp javafx-sdk-${JAVAFX_VERSION}/lib/javafx.controls.jar lib/
          cp javafx-sdk-${JAVAFX_VERSION}/lib/javafx.fxml.jar lib/
          cp javafx-sdk-${JAVAFX_VERSION}/lib/javafx.graphics.jar lib/
          rm -rf javafx-sdk-${JAVAFX_VERSION} javafx-sdk.zip

      - name: Compile
        run: |
          JAVAFX_CP=""
          for jar in lib/javafx*.jar; do JAVAFX_CP="$JAVAFX_CP:$jar"; done
          javac -sourcepath src \
            -cp "drivers/ojdbc17-23.26.1.0.0.jar:drivers/postgresql-42.7.10.jar$JAVAFX_CP" \
            src/com/datacube/*.java src/com/datacube/*/*.java src/com/datacube/fx/*.java src/com/datacube/DataCubeFx.java

      - name: Fat JAR
        run: |
          mkdir -p fat-jar
          # 解压驱动到 fat-jar
          cd fat-jar
          jar xf ../drivers/ojdbc17-23.26.1.0.0.jar
          jar xf ../drivers/postgresql-42.7.10.jar
          rm -rf META-INF
          cd ..
          # 解压 JavaFX 到 fat-jar
          for jar in lib/javafx*.jar; do
            (cd fat-jar && jar xf ../$jar)
          done
          rm -rf fat-jar/META-INF
          # 复制编译后的 class 文件
          cp -r src/com fat-jar/
          find fat-jar/com -name "*.java" -delete
          # 创建 manifest
          cat > MANIFEST.MF << 'EOF'
          Manifest-Version: 1.0
          Main-Class: com.datacube.DataCube
          EOF
          # 打包 fat JAR
          jar cfm DataCube.jar MANIFEST.MF -C fat-jar .

      - name: Minimal JRE
        run: |
          # 收集 JavaFX 模块
          JAVAFX_MODS=""
          for jar in lib/javafx*.jar; do
            JAVAFX_MODS="$JAVAFX_MODS:$jar"
          done
          jlink \
            --module-path "$JAVA_HOME/jmods${JAVAFX_MODS}" \
            --add-modules java.base,java.sql,java.naming,java.management,java.security.jgss,javafx.controls,javafx.fxml \
            --output jre \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=zip-6

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # 纯 JAR 包（含 GUI 支持）
          zip "data-cube-${VERSION}.zip" DataCube.jar
          # JAR + JRE 包
          mkdir -p "data-cube-jre/data-cube-${VERSION}"
          cp DataCube.jar "data-cube-jre/data-cube-${VERSION}/"
          cp -r jre "data-cube-jre/data-cube-${VERSION}/"
          cp run.sh run.bat run-gui.sh run-gui.bat "data-cube-jre/data-cube-${VERSION}/"
          cd data-cube-jre && zip -r "../data-cube-${VERSION}-win64-jre.zip" "data-cube-${VERSION}"

      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}" || true
          git push origin "${{ steps.version.outputs.tag }}" || true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## data-cube ${{ steps.version.outputs.tag }}

            | 文件 | 说明 |
            |------|------|
            | `data-cube-${{ steps.version.outputs.tag }}.zip` | 纯 JAR（需 Java 21+，已内置 GUI） |
            | `data-cube-${{ steps.version.outputs.tag }}-win64-jre.zip` | 内置 JRE（无需安装 Java，仅 Windows x64） |

            ### 运行方式
            ```bash
            # CLI 模式
            java -jar DataCube.jar

            # GUI 模式
            java -jar DataCube.jar --gui

            # 内置 JRE 版（解压后直接运行）
            ./run.sh          # CLI
            ./run-gui.sh      # GUI
            ```
          files: |
            data-cube-${{ steps.version.outputs.tag }}.zip
            data-cube-${{ steps.version.outputs.tag }}-win64-jre.zip

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          echo "### Release ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [纯 JAR](https://github.com/${{ github.repository }}/releases/download/${VERSION}/data-cube-${VERSION}.zip)" >> $GITHUB_STEP_SUMMARY
          echo "- [内置 JRE](https://github.com/${{ github.repository }}/releases/download/${VERSION}/data-cube-${VERSION}-win64-jre.zip)" >> $GITHUB_STEP_SUMMARY
